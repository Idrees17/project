<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account | MMA Gym</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      width: 100%;
      max-width: 440px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .register-header {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      border-radius: 16px 16px 0 0;
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .register-header i {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    .register-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: 1px;
    }
    .register-header p {
      margin: 0.25rem 0 0;
      opacity: 0.85;
      font-size: 0.9rem;
    }
    .register-body {
      padding: 2rem;
    }
  </style>
</head>
<body>
<div class="register-card card">
  <div class="register-header">
    <i class="bi bi-person-plus-fill"></i>
    <h1>Create Account</h1>
    <p>MMA Gym Member Portal</p>
  </div>
  <div class="register-body">

    {{ERROR_ALERT}}

    <form method="POST" action="/register">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username"
                 value="{{PREFILL_USERNAME}}"
                 placeholder="Choose a username" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password"
                 placeholder="At least 6 characters" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" name="confirmPassword"
                 placeholder="Repeat your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-person-check me-2"></i>Create Account
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center text-muted mb-0" style="font-size:0.9rem">
      Already have an account?
      <a href="/login" class="text-decoration-none fw-semibold">Sign in</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
