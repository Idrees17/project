<div class="page-header">
    <h2><i class="bi bi-door-open me-2"></i>Rooms</h2>
</div>

<div class="card mb-4">
    <div class="card-header fw-semibold">Add Room</div>
    <div class="card-body">
        <form method="POST" action="/admin/rooms" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Capacity</label>
                <input class="form-control" type="number" name="capacity" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" type="submit">Add</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Capacity</th><th>Actions</th></tr>
            </thead>
            <tbody>{{ROWS_ROOMS}}</tbody>
        </table>
    </div>
</div>
