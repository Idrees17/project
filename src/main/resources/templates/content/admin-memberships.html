<div class="page-header">
    <h2><i class="bi bi-card-checklist me-2"></i>Manage Memberships</h2>
</div>

<div class="card mb-4">
    <div class="card-header fw-semibold">Create Membership</div>
    <div class="card-body">
        <form method="POST" action="/admin/memberships" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Membership Name</label>
                <input class="form-control" name="membershipName" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Description</label>
                <input class="form-control" name="description">
            </div>
            <div class="col-md-3">
                <label class="form-label">Allowed Martial Arts</label>
                <select id="artsSelect" class="form-select" multiple size="6" onchange="syncArts()">
                    <option value="MMA">MMA</option>
                    <option value="Boxing">Boxing</option>
                    <option value="Kickboxing">Kickboxing</option>
                    <option value="Muay Thai">Muay Thai</option>
                    <option value="Jiu Jitsu">Jiu Jitsu</option>
                    <option value="Wrestling">Wrestling</option>
                </select>
                <input type="hidden" id="allowedMartialArts" name="allowedMartialArts">
            </div>
            <div class="col-md-3">
                <label class="form-label">Allowed Skill Levels</label>
                <select id="skillsSelect" class="form-select" multiple size="2" onchange="syncSkills()">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate/Advanced">Intermediate/Advanced</option>
                </select>
                <input type="hidden" id="allowedSkillLevels" name="allowedSkillLevels">
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit"><i class="bi bi-plus-circle me-1"></i>Create</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Description</th><th>Martial Arts</th><th>Skill Levels</th><th>Actions</th></tr>
            </thead>
            <tbody>{{ROWS_MEMBERSHIPS}}</tbody>
        </table>
    </div>
</div>

<script>
function syncArts() {
    document.getElementById('allowedMartialArts').value =
        Array.from(document.getElementById('artsSelect').selectedOptions).map(o => o.value).join(',');
}
function syncSkills() {
    document.getElementById('allowedSkillLevels').value =
        Array.from(document.getElementById('skillsSelect').selectedOptions).map(o => o.value).join(',');
}
</script>
