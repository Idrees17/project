<div class="page-header">
    <h2><i class="bi bi-trophy me-2"></i>Manage Events</h2>
</div>

<div class="card mb-4">
    <div class="card-header fw-semibold">Create New Event</div>
    <div class="card-body">
        <form method="POST" action="/admin/tournaments" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Event Name</label>
                <input class="form-control" name="eventName" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" name="eventDate">
            </div>
            <div class="col-md-3">
                <label class="form-label">Location</label>
                <input class="form-control" name="location">
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    <option>Upcoming</option><option>Open</option>
                    <option>Live</option><option>Completed</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label">Format</label>
                <select class="form-select" name="format">
                    <option value="MATCHES">Matches</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Allowed Martial Arts</label>
                <div class="d-flex flex-wrap gap-3">
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="MMA"><label class="form-check-label">MMA</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Boxing"><label class="form-check-label">Boxing</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Kickboxing"><label class="form-check-label">Kickboxing</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Muay Thai"><label class="form-check-label">Muay Thai</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Jiu Jitsu"><label class="form-check-label">Jiu Jitsu</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Wrestling"><label class="form-check-label">Wrestling</label></div>
                </div>
                <input type="hidden" id="allowedMartialArts" name="allowedMartialArts">
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit"><i class="bi bi-plus-circle me-1"></i>Create Event</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Date</th><th>Location</th><th>Status</th><th>Martial Arts</th><th>Actions</th></tr>
            </thead>
            <tbody>{{ROWS_EVENTS}}</tbody>
        </table>
    </div>
</div>

<script>
document.querySelectorAll('.arts-cb').forEach(cb => cb.addEventListener('change', () => {
    document.getElementById('allowedMartialArts').value =
        Array.from(document.querySelectorAll('.arts-cb:checked')).map(c => c.value).join(',');
}));
</script>
