<div class="page-header">
    <h2><i class="bi bi-person me-2"></i>My Profile</h2>
</div>

<div class="card" style="max-width:600px">
    <div class="card-body">
        <form method="POST" action="/member/profile" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input class="form-control" name="firstName" value="{{FIRST_NAME}}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input class="form-control" name="lastName" value="{{LAST_NAME}}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" name="age" value="{{AGE}}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Height (cm)</label>
                <input type="number" class="form-control" name="heightCm" value="{{HEIGHT_CM}}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Weight (kg)</label>
                <input type="number" step="0.1" class="form-control" name="weightKg" value="{{WEIGHT_KG}}">
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-check-lg me-1"></i>Save Profile
                </button>
            </div>
        </form>
    </div>
</div>
