<div class="page-header">
    <h2><i class="bi bi-pencil me-2"></i>Edit Membership</h2>
</div>

<div class="card" style="max-width:700px">
    <div class="card-body">
        <form method="POST" action="/admin/edit-membership" class="row g-3">
            <input type="hidden" name="membershipId" value="{{MEMBERSHIP_ID}}">
            <div class="col-md-6">
                <label class="form-label">Name</label>
                <input class="form-control" name="membershipName" value="{{MEMBERSHIP_NAME}}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Description</label>
                <input class="form-control" name="description" value="{{DESCRIPTION}}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Allowed Martial Arts</label>
                <select id="artsSelect" class="form-select" multiple size="6" onchange="syncArts()">
                    {{OPTIONS_ARTS}}
                </select>
                <input type="hidden" id="allowedMartialArts" name="allowedMartialArts" value="{{ALLOWED_ARTS}}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Allowed Skill Levels</label>
                <select id="skillsSelect" class="form-select" multiple size="2" onchange="syncSkills()">
                    {{OPTIONS_SKILLS}}
                </select>
                <input type="hidden" id="allowedSkillLevels" name="allowedSkillLevels" value="{{ALLOWED_SKILLS}}">
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-1"></i>Update</button>
                <a href="/admin/memberships" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function syncArts() {
    document.getElementById('allowedMartialArts').value =
        Array.from(document.getElementById('artsSelect').selectedOptions).map(o => o.value).join(',');
}
function syncSkills() {
    document.getElementById('allowedSkillLevels').value =
        Array.from(document.getElementById('skillsSelect').selectedOptions).map(o => o.value).join(',');
}
</script>
