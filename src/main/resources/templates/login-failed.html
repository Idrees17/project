<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Failed | MMA Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="card text-center p-4">
    <div class="mb-3" style="font-size:4rem;color:#dc3545">
        <i class="bi bi-x-circle-fill"></i>
    </div>
    <h3 class="fw-bold">Login Failed</h3>
    <p class="text-muted">The username or password you entered is incorrect. Please try again.</p>
    <a href="/login" class="btn btn-primary mt-2">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
