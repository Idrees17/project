<div class="page-header d-flex justify-content-between align-items-center">
    <h2><i class="bi bi-calendar3 me-2"></i>Timetable Management</h2>
    <div class="d-flex gap-2">
        <a href="/admin/add-session" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Add Session</a>
        <a href="/admin/generate-timetable" class="btn btn-outline-secondary"><i class="bi bi-magic me-1"></i>Generate</a>
    </div>
</div>

{{GENERATION_LOG}}

<!-- Week navigation -->
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="/admin/timetable?week={{PREV_WEEK}}" class="btn btn-outline-secondary">
        <i class="bi bi-chevron-left me-1"></i>Previous Week
    </a>
    <h5 class="mb-0 fw-semibold">{{WEEK_LABEL}}</h5>
    <a href="/admin/timetable?week={{NEXT_WEEK}}" class="btn btn-outline-secondary">
        Next Week<i class="bi bi-chevron-right ms-1"></i>
    </a>
    <a href="/admin/timetable" class="btn btn-outline-primary ms-2">Today</a>
</div>

<!-- Timetable grid -->
<div class="card">
    <div class="card-body p-0">
        <div style="overflow-x:auto">
            <table class="table table-bordered mb-0" style="min-width:900px; table-layout:fixed">
                <thead>
                <tr style="background:#212529; color:#fff">
                    <th style="width:80px" class="text-center py-3">Time</th>
                    {{DAY_HEADERS}}
                </tr>
                </thead>
                <tbody>
                {{TIME_ROWS}}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Legend -->
<div class="d-flex gap-3 mt-3 flex-wrap">
    <span><span class="badge me-1" style="background:#0d6efd">&nbsp;</span>Manual</span>
    <span><span class="badge me-1" style="background:#6f42c1">&nbsp;</span>Generated</span>
</div>

<style>
    .session-block {
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 0.8rem;
        color: #fff;
        margin-bottom: 2px;
    }
    .session-block .session-name { font-weight: 600; display: block; }
    .session-block .session-meta { opacity: 0.85; display: block; font-size: 0.72rem; }
    .session-block .session-registrants { opacity: 0.9; display: block; font-size: 0.72rem; }
    .session-block .session-actions { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .timetable-cell { vertical-align: top; padding: 4px !important; min-height: 60px; }
    .time-cell { vertical-align: middle; text-align: center; font-size: 0.8rem;
        color: #6c757d; font-weight: 600; padding: 4px !important; }
</style>
