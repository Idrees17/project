<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{PAGE_TITLE}} | MMA Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .sidebar { min-height: calc(100vh - 56px); background: #1a1a2e; padding-top: 1rem; }
        .sidebar .nav-link { color: #adb5bd; padding: .5rem 1rem; border-radius: 6px; margin: 2px 8px; transition: background .15s; }
        .sidebar .nav-link:hover { color: #fff; background: #16213e; }
        .sidebar .nav-link.active { color: #fff; background: #0d6efd; }
        .sidebar .nav-link i { margin-right: 8px; }
        .main-content { padding: 2rem; }
        .page-header { border-bottom: 2px solid #dee2e6; padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .table thead th { background-color: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1a1a2e">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-person-circle me-2"></i>MMA Gym Member Portal</span>
        <a href="/login" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-2 d-none d-md-block sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a href="/member-dashboard"   class="nav-link {{NAV_DASHBOARD}}"> <i class="bi bi-speedometer2"></i>Dashboard</a></li>
                <li class="nav-item"><a href="/member/timetable"   class="nav-link {{NAV_TIMETABLE}}"> <i class="bi bi-calendar3"></i>Timetable</a></li>
                <li class="nav-item"><a href="/member/events"      class="nav-link {{NAV_EVENTS}}">    <i class="bi bi-trophy"></i>Events</a></li>
                <li class="nav-item"><a href="/member/memberships" class="nav-link {{NAV_MEMBERSHIP}}"><i class="bi bi-card-checklist"></i>Membership</a></li>
                <li class="nav-item"><a href="/member/profile"     class="nav-link {{NAV_PROFILE}}">   <i class="bi bi-person"></i>My Profile</a></li>
            </ul>
        </nav>

        <main class="col-md-10 main-content">
            {{PAGE_CONTENT}}
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
