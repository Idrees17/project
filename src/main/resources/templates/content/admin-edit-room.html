<div class="page-header">
    <h2><i class="bi bi-pencil me-2"></i>Edit Room</h2>
</div>

<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="POST" action="/admin/edit-room" class="row g-3">
            <input type="hidden" name="roomId" value="{{ROOM_ID}}">
            <div class="col-12">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" value="{{ROOM_NAME}}" required>
            </div>
            <div class="col-12">
                <label class="form-label">Capacity</label>
                <input class="form-control" type="number" name="capacity" value="{{ROOM_CAPACITY}}" required>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-1"></i>Update</button>
                <a href="/admin/rooms" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
