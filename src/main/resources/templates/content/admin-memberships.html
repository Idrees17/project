<div class="page-header">
    <h2><i class="bi bi-card-checklist me-2"></i>Manage Memberships</h2>
</div>

<div class="card mb-4">
    <div class="card-header fw-semibold">Create Membership</div>
    <div class="card-body">
        <form method="POST" action="/admin/memberships" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Membership Name</label>
                <input class="form-control" name="membershipName" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Description</label>
                <input class="form-control" name="description">
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Allowed Martial Arts</label>
                <div class="d-flex flex-wrap gap-3">
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="MMA"><label class="form-check-label">MMA</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Boxing"><label class="form-check-label">Boxing</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Kickboxing"><label class="form-check-label">Kickboxing</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Muay Thai"><label class="form-check-label">Muay Thai</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Jiu Jitsu"><label class="form-check-label">Jiu Jitsu</label></div>
                    <div class="form-check"><input class="form-check-input arts-cb" type="checkbox" value="Wrestling"><label class="form-check-label">Wrestling</label></div>
                </div>
                <input type="hidden" id="allowedMartialArts" name="allowedMartialArts">
            </div>
            <div class="col-12">
                <label class="form-label fw-semibold">Allowed Skill Levels</label>
                <div class="d-flex flex-wrap gap-3">
                    <div class="form-check"><input class="form-check-input skills-cb" type="checkbox" value="Beginner"><label class="form-check-label">Beginner</label></div>
                    <div class="form-check"><input class="form-check-input skills-cb" type="checkbox" value="Intermediate/Advanced"><label class="form-check-label">Intermediate/Advanced</label></div>
                </div>
                <input type="hidden" id="allowedSkillLevels" name="allowedSkillLevels">
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit"><i class="bi bi-plus-circle me-1"></i>Create</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
            <tr><th>ID</th><th>Name</th><th>Description</th><th>Martial Arts</th><th>Skill Levels</th><th>Actions</th></tr>
            </thead>
            <tbody>{{ROWS_MEMBERSHIPS}}</tbody>
        </table>
    </div>
</div>

<script>
    document.querySelectorAll('.arts-cb').forEach(cb => cb.addEventListener('change', () => {
        document.getElementById('allowedMartialArts').value =
            Array.from(document.querySelectorAll('.arts-cb:checked')).map(c => c.value).join(',');
    }));
    document.querySelectorAll('.skills-cb').forEach(cb => cb.addEventListener('change', () => {
        document.getElementById('allowedSkillLevels').value =
            Array.from(document.querySelectorAll('.skills-cb:checked')).map(c => c.value).join(',');
    }));
</script>
