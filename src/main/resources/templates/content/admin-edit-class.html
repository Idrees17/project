<div class="page-header">
  <h2><i class="bi bi-pencil me-2"></i>Edit Class</h2>
</div>

<div class="card" style="max-width:620px">
  <div class="card-body">
    <form method="POST" action="/admin/edit-class" class="row g-3">
      <input type="hidden" name="classId" value="{{CLASS_ID}}">
      <div class="col-md-6">
        <label class="form-label">Class Name</label>
        <input class="form-control" name="className" value="{{CLASS_NAME}}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Description</label>
        <input class="form-control" name="description" value="{{DESCRIPTION}}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Class Type</label>
        <select class="form-select" name="classType">
          {{OPTIONS_CLASS_TYPE}}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Skill Level</label>
        <select class="form-select" name="skillLevel">
          {{OPTIONS_SKILL_LEVEL}}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Capacity</label>
        <input type="number" class="form-control" name="capacity" value="{{CAPACITY}}" required>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-1"></i>Update</button>
        <a href="/admin/classes" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
