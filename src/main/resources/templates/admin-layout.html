<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}} | MMA Gym Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .sidebar { min-height: calc(100vh - 56px); background: #212529; padding-top: 1rem; }
    .sidebar .nav-link { color: #adb5bd; padding: .5rem 1rem; border-radius: 6px; margin: 2px 8px; transition: background .15s; }
    .sidebar .nav-link:hover { color: #fff; background: #343a40; }
    .sidebar .nav-link.active { color: #fff; background: #0d6efd; }
    .sidebar .nav-link i { margin-right: 8px; }
    .main-content { padding: 2rem; }
    .page-header { border-bottom: 2px solid #dee2e6; padding-bottom: 1rem; margin-bottom: 1.5rem; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .table thead th { background-color: #212529; color: #fff; border-color: #212529; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand"><i class="bi bi-shield-fill-check me-2"></i>MMA Gym Admin</span>
    <a href="/login" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">

    <nav class="col-md-2 d-none d-md-block sidebar">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin-dashboard"   class="nav-link {{NAV_DASHBOARD}}">  <i class="bi bi-speedometer2"></i>Dashboard</a></li>
        <li class="nav-item"><a href="/admin/classes"     class="nav-link {{NAV_CLASSES}}">    <i class="bi bi-journal-text"></i>Classes</a></li>
        <li class="nav-item"><a href="/admin/timetable"   class="nav-link {{NAV_TIMETABLE}}">  <i class="bi bi-calendar3"></i>Timetable</a></li>
        <li class="nav-item"><a href="/admin/coaches"     class="nav-link {{NAV_COACHES}}">    <i class="bi bi-person-badge"></i>Coaches</a></li>
        <li class="nav-item"><a href="/admin/rooms"       class="nav-link {{NAV_ROOMS}}">      <i class="bi bi-door-open"></i>Rooms</a></li>
        <li class="nav-item"><a href="/admin/members"     class="nav-link {{NAV_MEMBERS}}">    <i class="bi bi-people"></i>Members</a></li>
        <li class="nav-item"><a href="/admin/memberships" class="nav-link {{NAV_MEMBERSHIPS}}"><i class="bi bi-card-checklist"></i>Memberships</a></li>
        <li class="nav-item"><a href="/admin/tournaments" class="nav-link {{NAV_EVENTS}}">     <i class="bi bi-trophy"></i>Events</a></li>
      </ul>
    </nav>

    <main class="col-md-10 main-content">
      {{PAGE_CONTENT}}
    </main>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
