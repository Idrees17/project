<div class="page-header">
    <h2><i class="bi bi-person-badge me-2"></i>Coaches</h2>
</div>

<div class="card mb-4">
    <div class="card-header fw-semibold">Add Coach</div>
    <div class="card-body">
        <form method="POST" action="/admin/coaches" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Specialty</label>
                <select class="form-select" name="specialty">
                    <option value="MMA">MMA</option>
                    <option value="Boxing">Boxing</option>
                    <option value="Kickboxing">Kickboxing</option>
                    <option value="Muay Thai">Muay Thai</option>
                    <option value="Jiu Jitsu">Jiu Jitsu</option>
                    <option value="Wrestling">Wrestling</option>
                    <option value="Hyrox">Hyrox</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" type="submit">Add</button>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
            <tr><th>ID</th><th>Name</th><th>Specialty</th><th>Actions</th></tr>
            </thead>
            <tbody>{{ROWS_COACHES}}</tbody>
        </table>
    </div>
</div>
